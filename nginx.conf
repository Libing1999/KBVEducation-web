server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin API access from the browser: nginx proxies /api to the
    # backend container over the Docker network, mirroring the /api proxy
    # vite.config.ts uses in local dev. The browser never talks to the
    # backend's internal hostname directly.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router uses browser history routing - unknown paths fall back to
    # index.html so client-side routing handles them instead of a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|svg|woff2?|ttf|eot|ico|png|jpg|jpeg|gif)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
